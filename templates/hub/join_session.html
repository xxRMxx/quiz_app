<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Session beitreten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --panel: #0f1628;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #a78bfa;
      --danger: #f87171;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes gradientBG {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body {
      min-height: 100vh;
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(-45deg, #050816, #0b1026, #1a1f4a, #2b2f77);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: linear-gradient(180deg, rgba(17,24,39,.9), rgba(15,23,42,.9));
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(8px);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      text-align: center;
      margin-bottom: 0.4rem;
      letter-spacing: .3px;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: .4rem;
    }
    input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1px solid rgba(148,163,184,.25);
      border-radius: 10px;
      background: rgba(15,23,42,.7);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--primary); }
    input#code { text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; text-align: center; }
    .field { margin-bottom: 1.25rem; }
    .error {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.35);
      color: #fca5a5;
      border-radius: 8px;
      padding: .6rem .9rem;
      font-size: .875rem;
      margin-bottom: 1.25rem;
    }
    button {
      width: 100%;
      padding: .85rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      box-shadow: 0 4px 16px rgba(124,58,237,0.35);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    button:hover { opacity: .9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Session beitreten</h1>
    <p class="subtitle">Code eingeben und losspielen</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="code">Session-Code</label>
        <input id="code" name="code" type="text" maxlength="20"
               placeholder="z.B. ABC123" autocomplete="off" autofocus
               value="{{ request.POST.code|default:'' }}"/>
      </div>
      <div class="field">
        <label for="nickname">Dein Name</label>
        <input id="nickname" name="nickname" type="text" maxlength="30"
               placeholder="z.B. Anna" autocomplete="off"
               value="{{ request.POST.nickname|default:'' }}"/>
      </div>
      <button type="submit">Beitreten →</button>
    </form>
  </div>
</body>
</html>
