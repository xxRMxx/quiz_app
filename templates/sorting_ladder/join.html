{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Sorting Ladder - QuizMaster</title>
    {% include 'includes/player_head.html' %}
</head>
<body class="player-bg join-page">
    <div class="join-card">
        <div class="join-brand">
            <i data-lucide="arrow-up-down"></i>
            <span class="join-brand-name">QUIZMASTER</span>
        </div>
        <h1 class="join-title">Sorting Ladder beitreten</h1>
        <p class="join-subtitle">Name und Code eingeben</p>

        <!-- Join Form -->
        <form id="joinQuizForm" class="join-form">
            {% csrf_token %}
            <div class="p-field">
                <label class="p-label" for="participantName">Dein Name</label>
                <input type="text" class="p-input" id="participantName" name="participant_name"
                       placeholder="z.B. Anna" required maxlength="50" autocomplete="name" autofocus>
            </div>

            <div class="p-field">
                <label class="p-label" for="roomCode">Raum-Code (4 Ziffern)</label>
                <input type="text" class="p-input code-input" id="roomCode" name="room_code"
                       placeholder="0000" required pattern="[0-9]{4}" maxlength="4" autocomplete="off">
            </div>

            <button type="submit" class="p-btn" id="joinBtn">
                Beitreten →
            </button>
        </form>

        <!-- Status Messages -->
        <div id="statusMessage" class="p-status" style="display: none;"></div>

        <!-- Quiz Info (if room code is valid) -->
        <div id="quizInfo" class="quiz-info" style="display: none;">
            <div class="info-divider">
                <span>Game Information</span>
            </div>
            <div class="quiz-details">
                <div class="detail-item">
                    <i data-lucide="layers"></i>
                    <div>
                        <strong id="quizTitle">Game Title</strong>
                        <small id="quizStatus">Status: Waiting</small>
                    </div>
                </div>
                <div class="detail-item">
                    <i data-lucide="users"></i>
                    <div>
                        <strong id="participantCount">0 Participants</strong>
                        <small>Currently joined</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();

            const form = document.getElementById('joinQuizForm');
            const roomCodeInput = document.getElementById('roomCode');
            const joinBtn = document.getElementById('joinBtn');
            const statusMessage = document.getElementById('statusMessage');
            const quizInfo = document.getElementById('quizInfo');
            let roomCodeTimeout;

            // Only allow digits in room code field
            roomCodeInput.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '').substring(0, 4);

                clearTimeout(roomCodeTimeout);
                if (this.value.length === 4) {
                    roomCodeTimeout = setTimeout(() => checkRoomCode(this.value), 500);
                } else {
                    hideQuizInfo();
                }
            });

            // Prefill from query params and optional auto-submit
            const params = new URLSearchParams(window.location.search);
            const qpRoom = params.get('room_code');
            const qpNick = params.get('nickname');
            const hubSession = params.get('hub_session');
            if (hubSession) {
                try { localStorage.setItem('hub_session_code', hubSession); } catch (_) {}
            }
            if (qpRoom) {
                roomCodeInput.value = qpRoom;
                checkRoomCode(qpRoom);
            }
            if (qpNick) {
                document.getElementById('participantName').value = qpNick;
            }

            // Form submission
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const participantName = document.getElementById('participantName').value.trim();
                const roomCode = roomCodeInput.value.trim();

                if (!participantName || !roomCode) {
                    showStatusMessage('Please fill in all fields.', 'error');
                    return;
                }

                if (roomCode.length !== 4) {
                    showStatusMessage('Room code must be exactly 4 digits.', 'error');
                    return;
                }

                joinGame(participantName, roomCode);
            });

            function checkRoomCode(roomCode) {
                fetch(`/sorting-ladder/check-room/${roomCode}/`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        showQuizInfo(data.quiz);
                        hideStatusMessage();
                    } else {
                        hideQuizInfo();
                        showStatusMessage(data.error, 'error');
                    }
                })
                .catch(() => hideQuizInfo());
            }

            function joinGame(participantName, roomCode) {
                joinBtn.classList.add('loading');
                hideStatusMessage();

                const hubSession = (() => {
                    try { return localStorage.getItem('hub_session_code') || ''; } catch (_) { return ''; }
                })();

                fetch('/sorting-ladder/join/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        participant_name: participantName,
                        room_code: roomCode,
                        hub_session: hubSession || null,
                    }),
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        showStatusMessage('Successfully joined! Redirecting...', 'success');
                        setTimeout(() => {
                            let url = `/sorting-ladder/play/${roomCode}/${encodeURIComponent(participantName)}/`;
                            if (hubSession) url += `?hub_session=${encodeURIComponent(hubSession)}`;
                            window.location.href = url;
                        }, 1000);
                    } else {
                        showStatusMessage(data.error, 'error');
                    }
                })
                .catch(() => showStatusMessage('Failed to join game. Please try again.', 'error'))
                .finally(() => joinBtn.classList.remove('loading'));
            }

            function showQuizInfo(quiz) {
                document.getElementById('quizTitle').textContent = quiz.title;
                document.getElementById('quizStatus').textContent = `Status: ${quiz.status}`;
                document.getElementById('participantCount').textContent = `${quiz.participant_count} Participants`;
                quizInfo.style.display = 'block';
            }

            function hideQuizInfo() {
                quizInfo.style.display = 'none';
            }

            function showStatusMessage(message, type) {
                statusMessage.textContent = message;
                statusMessage.className = `p-status p-status-${type}`;
                statusMessage.style.display = 'flex';
            }

            function hideStatusMessage() {
                statusMessage.style.display = 'none';
            }

            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }

            // Auto-submit if both name and room code provided via query params
            if (qpRoom && qpNick) {
                joinGame(qpNick, qpRoom);
            }

            // Auto-focus on first empty field
            if (!qpNick) {
                document.getElementById('participantName').focus();
            }
        });
    </script>
</body>
</html>
