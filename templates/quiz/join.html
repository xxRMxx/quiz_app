{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Quiz - QuizMaster</title>
    {% include 'includes/player_head.html' %}
</head>
<body class="player-bg join-page">
    <div class="join-card">
        <div class="join-brand">
            <i data-lucide="brain-circuit"></i>
            <span class="join-brand-name">QUIZMASTER</span>
        </div>
        <h1 class="join-title">Quiz beitreten</h1>
        <p class="join-subtitle">Name und Code eingeben</p>

        <!-- Join Form -->
        <form id="joinQuizForm" class="join-form">
            {% csrf_token %}
            <div class="p-field">
                <label class="p-label" for="participantName">Dein Name</label>
                <input type="text" class="p-input" id="participantName" name="participant_name"
                       placeholder="z.B. Anna" required maxlength="50" autocomplete="name" autofocus>
            </div>

            <div class="p-field">
                <label class="p-label" for="roomCode">Raum-Code (4 Ziffern)</label>
                <input type="text" class="p-input code-input" id="roomCode" name="room_code"
                       placeholder="0000" required pattern="[0-9]{4}" maxlength="4" autocomplete="off">
            </div>

            <button type="submit" class="p-btn" id="joinBtn">
                Beitreten →
            </button>
        </form>

        <!-- Status Messages -->
        <div id="statusMessage" class="p-status" style="display: none;"></div>

        <!-- Quiz Info (if room code is valid) -->
        <div id="quizInfo" class="quiz-info" style="display: none;">
            <div class="info-divider">
                <span>Quiz Information</span>
            </div>
            <div class="quiz-details">
                <div class="detail-item">
                    <i data-lucide="gamepad-2"></i>
                    <div>
                        <strong id="quizTitle">Quiz Title</strong>
                        <small id="quizStatus">Status: Waiting</small>
                    </div>
                </div>
                <div class="detail-item">
                    <i data-lucide="users"></i>
                    <div>
                        <strong id="participantCount">0 Participants</strong>
                        <small>Currently joined</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();

            const form = document.getElementById('joinQuizForm');
            const roomCodeInput = document.getElementById('roomCode');
            const joinBtn = document.getElementById('joinBtn');
            const statusMessage = document.getElementById('statusMessage');
            const quizInfo = document.getElementById('quizInfo');
            let roomCodeTimeout;

            // Format room code input
            roomCodeInput.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '').substring(0, 4);

                // Clear previous timeout
                clearTimeout(roomCodeTimeout);

                // Check room code validity after user stops typing
                if (this.value.length === 4) {
                    roomCodeTimeout = setTimeout(() => {
                        checkRoomCode(this.value);
                    }, 500);
                } else {
                    hideQuizInfo();
                }
            });

            // Prefill from query params
            const params = new URLSearchParams(window.location.search);
            const qpRoom = params.get('room_code');
            const qpNick = params.get('nickname');
            const hubSession = params.get('hub_session');
            if (hubSession) {
                try { localStorage.setItem('hub_session_code', hubSession); } catch (_) {}
            }
            if (qpRoom) {
                roomCodeInput.value = qpRoom;
                checkRoomCode(qpRoom);
            }
            if (qpNick) {
                const nameEl = document.getElementById('participantName');
                nameEl.value = qpNick;
            }

            // Form submission
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const formData = new FormData(this);
                const participantName = formData.get('participant_name').trim();
                const roomCode = formData.get('room_code').trim();

                if (!participantName || !roomCode) {
                    showStatusMessage('Please fill in all fields.', 'error');
                    return;
                }

                if (roomCode.length !== 4) {
                    showStatusMessage('Room code must be exactly 4 digits.', 'error');
                    return;
                }

                joinQuiz(participantName, roomCode);
            });

            function checkRoomCode(roomCode) {
                fetch(`/quiz/check-room/${roomCode}/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showQuizInfo(data.quiz);
                        hideStatusMessage();
                    } else {
                        hideQuizInfo();
                        showStatusMessage(data.error, 'error');
                    }
                })
                .catch(error => {
                    console.error('Error checking room code:', error);
                    hideQuizInfo();
                });
            }

            function joinQuiz(participantName, roomCode) {
                joinBtn.classList.add('loading');
                hideStatusMessage();

                fetch('/quiz/join/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                        'Content-Type': 'application/json',
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        participant_name: participantName,
                        room_code: roomCode
                    })
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Join response:', data); // Debug log
                    if (data.success) {
                        showStatusMessage('Successfully joined! Redirecting...', 'success');
                        // Give a moment for the message to show, then redirect
                        setTimeout(() => {
                            const redirectUrl = `/quiz/play/${roomCode}/${encodeURIComponent(participantName)}/`;
                            console.log('Redirecting to:', redirectUrl); // Debug log
                            window.location.href = redirectUrl;
                        }, 1500);
                    } else {
                        console.error('Join failed:', data.error);
                        showStatusMessage(data.error, 'error');
                    }
                })
                .catch(error => {
                    console.error('Error joining quiz:', error);
                    showStatusMessage('Failed to join quiz. Please try again.', 'error');
                })
                .finally(() => {
                    joinBtn.classList.remove('loading');
                });
            }

            function showQuizInfo(quiz) {
                document.getElementById('quizTitle').textContent = quiz.title;
                document.getElementById('quizStatus').textContent = `Status: ${quiz.status}`;
                document.getElementById('participantCount').textContent = `${quiz.participant_count} Participants`;
                quizInfo.style.display = 'block';
            }

            function hideQuizInfo() {
                quizInfo.style.display = 'none';
            }

            function showStatusMessage(message, type) {
                statusMessage.textContent = message;
                statusMessage.className = `p-status p-status-${type}`;
                statusMessage.style.display = 'flex';
            }

            function hideStatusMessage() {
                statusMessage.style.display = 'none';
            }

            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }

            // Auto-submit if both provided via query
            if (qpRoom && qpNick) {
                joinQuiz(qpNick, qpRoom);
            }

            // Auto-focus on first input if not prefilled
            if (!qpNick) {
                document.getElementById('participantName').focus();
            }
        });
    </script>
</body>
</html>
