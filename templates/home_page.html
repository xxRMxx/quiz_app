<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .home-page-wrapper {
        width: 100%;
        min-height: 100vh;
        padding: 2rem 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        background:  linear-gradient(10deg, 
        #4f46e5,
  #4338ca,
   #3730a3,
   #312e81)
    }
    .home-page-wrapper .games-choose-area {
        display: flex;
        align-items: center;
        flex-direction: column;
        width: 40%;
    }

    .home-page-wrapper .games-choose-area .heading {
        color: white;
        margin-bottom: 2rem;
        font-family: sans-serif;
    }
    
    .home-page-wrapper .games-choose-area .links {
        width: 100%;
        display: flex;
        align-items: start;
        gap: 10px;
        flex-direction: column;
    }

    .home-page-wrapper .games-choose-area .links a {
        background:linear-gradient(10deg, #67e8f9, #22d3ee, #06b6d4,#0e7490);
        padding: 2rem 1rem;
        width: 100%;
        border-radius: 20px;
        text-decoration: none;
        font-family: sans-serif;
        font-size: 24px;
        box-shadow: #312e81;
        color: white;
    }
    
    .home-page-wrapper .games-choose-area .links a:hover {
        scale: 1.01;
        transition: .3s;
    }

    @media screen and (max-width:770px ) {
    .home-page-wrapper .games-choose-area {
        width: 90%;
    }

    }

</style>
<body>

    <div class="home-page-wrapper">
        <div class="games-choose-area">
            <h1 class="heading">
                Choose Your Challenge
            </h1>
            <div class="links">
                <a href="{% url 'games_hub:join_session' %}">Session beitreten</a>
                <a href="{% url 'quiz:join' %}">Simple Quiz</a>
                <a href="{% url 'assign:join' %}">Assign</a>
                <a href="{% url 'estimation:join' %}">Estimation</a>
                <a href="{% url 'who_is_lying:join' %}">Who is Lying</a>
                <a href="{% url 'where_is_this:join' %}">Where is This</a>
                <a href="{% url 'who_is_that:join' %}">Who is That</a>
                <a href="{% url 'black_jack_quiz:join' %}">Black Jack Quiz</a>
            </div>
        </div>
    </div>
    
</body>
</html>
